name: vod-strm-builder

services:
  vod-strm-builder:
    image: mars148/vod-strm-builder:latest
    container_name: vod-strm-builder
    user: "999:996"
    ports:
      - "18080:8080"
    environment:
      RUST_LOG: info
      VSB_WORK_DIR: /work
      VSB_BIND: 0.0.0.0:8080
    volumes:
      - /opt/vod-strm-builder/work:/work
      - /mnt/strm/movies:/media/movies
      - /mnt/strm/tvshows:/media/tvshows
    restart: unless-stopped
