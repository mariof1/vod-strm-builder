name: Build Docker Image

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      platforms:
        description: Build platforms
        required: true
        type: choice
        options:
          - linux/amd64
          - linux/amd64,linux/arm64
        default: linux/amd64,linux/arm64

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/vod-strm-builder

permissions:
  contents: read
  packages: write

jobs:
  check:
    name: Test And Compose Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e . pytest

      - name: Test
        run: pytest

      - name: Validate Compose Files
        run: |
          docker compose -f docker-compose.yml config >/tmp/docker-compose.rendered.yml
          docker compose -f deploy/portainer-stack.yml config >/tmp/portainer-stack.rendered.yml

      - name: Upload Rendered Compose
        uses: actions/upload-artifact@v4
        with:
          name: rendered-compose
          path: |
            /tmp/docker-compose.rendered.yml
            /tmp/portainer-stack.rendered.yml

  docker:
    name: Build And Push
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5

      - name: Set Platforms
        id: platforms
        run: |
          if [ -n "${{ inputs.platforms }}" ]; then
            echo "platforms=${{ inputs.platforms }}" >> "$GITHUB_OUTPUT"
          else
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: contains(steps.platforms.outputs.platforms, 'arm64')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ steps.platforms.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
