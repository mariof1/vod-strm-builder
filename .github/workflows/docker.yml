name: Build Docker Image

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      platforms:
        description: Build platforms
        required: true
        type: choice
        options:
          - linux/amd64
          - linux/amd64,linux/arm64
        default: linux/amd64,linux/arm64

env:
  DOCKERHUB_USER: mars148
  IMAGE_NAME: vod-strm-builder
  IMAGE_REF: mars148/vod-strm-builder

permissions:
  contents: read
  actions: write

jobs:
  check:
    name: Test And Compose Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e . pytest

      - name: Test
        run: pytest

      - name: Validate Compose Files
        run: |
          docker compose -f docker-compose.yml config >/tmp/docker-compose.rendered.yml
          docker compose -f deploy/portainer-stack.yml config >/tmp/portainer-stack.rendered.yml

      - name: Upload Rendered Compose
        uses: actions/upload-artifact@v7.0.1
        with:
          name: rendered-compose
          path: |
            /tmp/docker-compose.rendered.yml
            /tmp/portainer-stack.rendered.yml

  docker:
    name: Build And Push
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set Platforms
        id: platforms
        run: |
          if [ -n "${{ inputs.platforms }}" ]; then
            echo "platforms=${{ inputs.platforms }}" >> "$GITHUB_OUTPUT"
          else
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: contains(steps.platforms.outputs.platforms, 'arm64')
        uses: docker/setup-qemu-action@v4.1.0
        with:
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Verify Docker Hub Secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets before publishing."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.IMAGE_REF }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and Push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: ${{ steps.platforms.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
